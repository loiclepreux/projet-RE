<main class="forum-container">

            <!-- Créer un sujet -->
            <section class="forum-create">
                <h1>Nouveau sujet</h1>
                <input type="text" id="topic-title" placeholder="Titre du sujet">
                <textarea id="topic-message" placeholder="Message..."></textarea>
                <button id="create-topic">Créer</button>
            </section>

            <!-- Liste des sujets -->
            <section class="forum-list">
                <h2>Sujets récents</h2>
                <div id="topics">
                <!-- Insertion dynamique des sujets -->
                </div>
            </section>

        </main>
